name: Update Playlists

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    # 必须添加这个权限声明，否则 GITHUB_TOKEN 可能无法推送代码
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: 下载、过滤、修改并合并播放列表
        run: |
          # 1. 创建新文件并写入头信息
          echo "#EXTM3U" > modified_playlist.m3u

          urls=(
            "https://raw.githubusercontent.com/Tzwcard/ChinaTelecom-GuangdongIPTV-RTP-List/master/GuangdongIPTV_rtp_hd.m3u"
            "https://raw.githubusercontent.com/Tzwcard/ChinaTelecom-GuangdongIPTV-RTP-List/refs/heads/master/GuangdongIPTV_rtp_4k.m3u"
          )

          for src in "${urls[@]}"; do
            echo "正在处理: $src"
            # 使用 -f 确保 curl 遇到 404 等错误时直接返回非零状态
            if curl -sf "$src" > temp.m3u; then
              # 处理逻辑：过滤 AVS2/CAVS -> 替换 IP -> 剔除重复头
              sed '/AVS2\|CAVS/{N;d;}' temp.m3u | \
              sed 's|rtp://|http://192.168.2.6:8888/rtp/|g' | \
              grep -v "#EXTM3U" >> modified_playlist.m3u
            else
              echo "警告: 无法下载 $src，跳过此源"
            fi
            rm -f temp.m3u
          done

      - name: 提交修改
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add modified_playlist.m3u
          
          # 检查是否有实际变化
          if git diff --staged --quiet; then
            echo "没有检测到任何内容变化，无需更新。"
          else
            git commit -m "自动更新播放列表：合并并过滤 AVS2/CAVS"
            # 推送失败通常是因为权限，这里尝试使用默认配置推送
            git push
          fi
